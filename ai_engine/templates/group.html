<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cinema Dude - Watch With Friends</title>
    <style>
        html,
        body {
            background: #141414;
            color: #fff;
            font-family: Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4%;
            height: 68px;
            border-bottom: 1px solid #333;
        }

        .main {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .chat-panel {
            width: 300px;
            background: #000;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 15px;
        }

        .msg-user {
            font-weight: bold;
            color: #e50914;
            margin-right: 8px;
            font-size: 0.9em;
        }

        .msg-text {
            background: #333;
            padding: 8px 12px;
            border-radius: 12px;
            display: inline-block;
            max-width: 85%;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
        }

        .chat-input input {
            flex-grow: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background: #333;
            color: white;
        }

        .chat-input button {
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-left: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .content-panel {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .card {
            width: 200px;
            margin-right: 15px;
            margin-bottom: 20px;
            display: inline-block;
            vertical-align: top;
        }

        .card img {
            width: 100%;
            border-radius: 4px;
        }
    </style>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo" style="color:#e50914;font-size:1.5rem;font-weight:bold;cursor:pointer;"
            onclick="location.href='/home?userId={{userId}}'">CINEMA DUDE</div>
        <div>
            <span style="background:#333;padding:8px 15px;border-radius:20px;margin-right:20px;">Room Code: <b
                    style="color:#e50914;">{{room_code}}</b></span>
            <button
                style="background:transparent;border:1px solid #fff;color:#fff;padding:6px 15px;border-radius:4px;cursor:pointer;"
                onclick="copyLink()">Copy Invite Link</button>
        </div>
    </header>

    <div class="main">
        <div class="content-panel">
            <h2>Group Recommendations</h2>
            <p style="color:#aaa;">Suggestions based on everyone in the room</p>

            <div id="group-recommendations" style="display:flex;flex-wrap:wrap;margin-top:20px;">
                <p>Loading...</p>
            </div>
        </div>

        <div class="chat-panel">
            <div class="messages" id="chat-messages"></div>
            <div class="chat-input" style="flex-shrink:0;">
                <input type="text" id="chat-box" placeholder="Message group..."
                    onkeypress="if(event.key === 'Enter') sendChat()">
                <button onclick="sendChat()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const ROOM_CODE = "{{ room_code }}";
        const USER_ID = {{ userId|default (1) }};
        const USERNAME = "{{ user }}";

        async function fetchRecommendations() {
            const res = await fetch(`/api/group/${ROOM_CODE}/recommend`);
            const data = await res.json();

            const container = document.getElementById("group-recommendations");
            if (data.length === 0) {
                container.innerHTML = "<p>Ask friends to join to see combined suggestions!</p>";
                return;
            }

            container.innerHTML = data.map(m => `
            <div class="card" style="position:relative;">
                <img src="${m.poster}" alt="${m.title}">
                <div class="match-score">${m.match_score}% Group Match</div>
                <p class="card-title">${m.title}</p>
                <div class="ai-reasons">
                    ${m.reasons.map(r => `<div class="ai-reason">🤝 ${r}</div>`).join('')}
                </div>
            </div>
        `).join('');
        }

        async function fetchChat() {
            const res = await fetch(`/api/group/${ROOM_CODE}/chat`);
            const messages = await res.json();

            const container = document.getElementById("chat-messages");
            const wasBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 1;

            container.innerHTML = messages.map(m => `
            <div class="message">
                <span class="msg-user">${m.username}</span>
                <span class="msg-text">${m.message}</span>
            </div>
        `).join('');

            if (wasBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        async function sendChat() {
            const box = document.getElementById("chat-box");
            const msg = box.value.trim();
            if (!msg) return;

            await fetch('/api/group/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: USER_ID, room_code: ROOM_CODE, message: msg })
            });

            box.value = "";
            fetchChat();
        }

        function copyLink() {
            const link = window.location.origin + `/group?room=${ROOM_CODE}`;
            navigator.clipboard.writeText(link);
            alert("Invite link copied!");
        }

        // Initial fetch and polling
        fetchRecommendations();
        fetchChat();
        setInterval(fetchChat, 3000);
        setInterval(fetchRecommendations, 10000); // Poll for new recommendations as users join
    </script>
</body>

</html>
